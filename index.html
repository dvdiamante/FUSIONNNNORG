<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Clean BVB Fusion</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    body {
      background-color: transparent;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding-left: 20px;
      overflow: hidden;
    }

    /* Container 100% Transparente */
    .banner-clean {
      position: relative;
      height: 48px;
      background: transparent; /* SEM FUNDO PRETO */
      display: flex;
      align-items: center;
      overflow: hidden;
      animation: expandDynamic 9s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    }

    @keyframes expandDynamic {
      0%, 8% {
        width: 48px; /* Mostra só o ícone */
      }
      18%, 46% {
        width: 220px; /* Expande para o texto */
      }
      54%, 86% {
        width: 250px; /* Expande para o Discord */
      }
      94%, 100% {
        width: 48px; /* Recolhe de volta pro ícone */
      }
    }

    /* Foto/Logo do Touro Flutuante */
    .avatar {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: transparent;
      z-index: 10;
      filter: drop-shadow(0 0 6px rgba(255, 30, 39, 0.8));
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 6px;
    }

    /* Área dos textos */
    .text-area {
      position: relative;
      flex-grow: 1;
      height: 100%;
      display: flex;
      align-items: center;
      margin-left: 10px;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    /* Animação de entrada dos textos */
    .panel-1 {
      animation: switchText1 9s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    }

    .panel-2 {
      animation: switchText2 9s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    }

    @keyframes switchText1 {
      0%, 14% {
        opacity: 0;
        transform: translateX(-15px);
      }
      20%, 44% {
        opacity: 1;
        transform: translateX(0);
      }
      48%, 100% {
        opacity: 0;
        transform: translateX(15px);
      }
    }

    @keyframes switchText2 {
      0%, 50% {
        opacity: 0;
        transform: translateX(-15px);
      }
      56%, 84% {
        opacity: 1;
        transform: translateX(0);
      }
      90%, 100% {
        opacity: 0;
        transform: translateX(15px);
      }
    }

    /* Estilo dos Textos com Sombra para destacar da Gameplay */
    .text-group {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .sub-title {
      color: #ffffff;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px #000000, -1px -1px 2px #000000;
    }

    .main-title {
      color: #ff1e27;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 30, 39, 1), 2px 2px 4px #000000;
      margin-top: 1px;
    }

    /* Estilo do Discord Clean */
    .dc-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dc-tag {
      background: #ff1e27;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 0 0 8px rgba(255, 30, 39, 0.6);
    }

    .dc-link {
      color: #ffffff;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-shadow: 2px 2px 4px #000000, -1px -1px 2px #000000;
    }

    .dc-link span {
      color: #ff1e27;
    }
  </style>
</head>
<body>

  <div class="banner-clean">
    
    <div class="avatar">
      <img src="logo.png" alt="BVB Touro">
    </div>

    <div class="text-area">
      
      <div class="panel panel-1">
        <div class="text-group">
          <span class="sub-title">VEM PRA</span>
          <span class="main-title">BVB FUSION</span>
        </div>
      </div>

      <div class="panel panel-2">
        <div class="dc-box">
          <span class="dc-tag">DISCORD</span>
          <span class="dc-link"><span>discord.gg/</span>AYNmqZ7d3</span>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
